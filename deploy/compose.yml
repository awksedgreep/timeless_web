services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:5880:5880"
    environment:
      PHX_SERVER: "true"
      PHX_HOST: "${PHX_HOST:?set PHX_HOST}"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE:?set SECRET_KEY_BASE}"
      DATABASE_PATH: /data/timeless_web.db
      PORT: "5880"
      PHX_IP: "0.0.0.0"
      RESEND_API_KEY: "${RESEND_API_KEY:?set RESEND_API_KEY}"
    volumes:
      - db_data:/data

volumes:
  db_data:
